<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="desafio.css">
    <title>Cotação de Moedas</title>
</head>

<body>

    <div class="container">

        <h1>Cotação de Moedas</h1>

        <div class="campo">
            <label for="valor">Digite o valor em Real (BRL)</label>
            <input type="number" id="valor" placeholder="Ex: 100">
        </div>

        <button id="btnCotar">Cotar</button>

        <div class="resultado">

            <p>Dólar: <span id="dolar">R$ 0,00</span></p>

            <p>Euro: <span id="euro">R$ 0,00</span></p>

            <p>Libra Esterlina: <span id="libra">R$ 0,00</span></p>

        </div>

    </div>
    <script src="desafio.js"></script>

</body>

</html>
