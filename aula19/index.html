<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="/aula19/imagens/logo.png" alt="Logo">
        <nav>
            <ul>
                <li><a href="#burguer">Hamburgueres</a></li>
                <li><a href="#acompanhamentos">Acompanhamentos</a></li>
                <li><a href="#bebidas">Bebidas</a></li>
                <li><a class="ancora" id="modalProdutoAdicionado">Carrinho</a></li>
            </ul>
        </nav>
    </header>

    <section id="sessaoBurguer">
        <h2 id="burguer">HAMBURGUERES</h2>
    </section>

    <section id="sessaoAcompanhamentos">
        <h2 id="acompanhamentos">ACOMPANHAMENTOS</h2>
    </section>

    <section id="sessaoBebidas">
        <h2 id="bebidas">BEBIDAS</h2>
    </section>

    <!-- botão carrinho -->


    <!-- offcanvas -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasScrolling">

        <div class="offcanvas-header">
            <h2 class="offcanvas-title">
                Carrinho de compras
            </h2>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="modal-body">

            <div class="carrinho-header">
                <span>Nome</span>
                <span>Preço</span>
                <span>Quantidade</span>
                <span>Ações</span>
            </div>

            <div id="modalProdutoNome"></div>

            <div class="box-limpar">
                <button id="limparCarrinho" class="btn btn-danger">
                    Limpar Carrinho
                </button>
            </div>

            <div class="box-total">
                <h3>Valor Total:</h3>
                <span id="modalTotalCarrinho">R$ 0,00</span>
            </div>

            <div class="box-finalizar">
                <button id="finalizarCompra" class="btn btn-success">
                    Finalizar Compra
                </button>
            </div>

        </div>
    </div>

    <!-- modal -->
    <div class="modal fade" id="modalDecisao" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content text-center p-4">

                <h4>Produto adicionado!</h4>

                <p>O que deseja fazer?</p>

                <div class="d-flex gap-2 justify-content-center">

                    <button id="btnIrCarrinho" class="btn btn-success">
                        Ir para carrinho
                    </button>

                    <button id="btnContinuarComprando" class="btn btn-secondary">
                        Continuar comprando
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="exercicio1.js"></script>

</body>

</html>
