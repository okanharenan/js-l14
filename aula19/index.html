<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Cardápio Digital - Live 13 </title>
</head>

<body>

    <header>
        <img class="logo" src="/aula19/imagens/logo.png" alt="Logo">
        <nav>
            <ul>
                <li><a href="#burguer">Hamburgueres</a></li>
                <li><a href="#acompanhamentos">Acompanhamentos</a></li>
                <li><a href="#bebidas">Bebidas</a></li>
            </ul>
        </nav>
    </header>


    <h1>CARDÁPIO DIGITAL LIVE 13</h1>

    <section id="sessaoBurguer">
        <h2 id="burguer">HAMBURGUERES</h2>
    </section>



    <section id="sessaoAcompanhamentos">
        <h2 id="acompanhamentos">ACOMPANHAMENTOS </h2>
    </section>


    <section id="sessaoBebidas">
        <h2 id="bebidas">BEBIDAS</h2>
    </section>

    <!-- MODAL -->
    <div class="modal fade" id="modalProdutoAdicionado" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Produtos adicionados</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p id="modalProdutoNome"></p>
                    <p id="modalProdutoPreco"></p>
                    <p id="modalTotalCarrinho"></p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Fechar
                    </button>
                </div>

            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="exercicio1.js"></script>
</body>

</html>
