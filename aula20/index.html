<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">

        <h1 class="mb-4">Cadastro de Produtos</h1>

        <form id="formProduto" class="bg-white p-4 rounded shadow-sm">

            <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" id="nome" class="form-control">

                <small id="erroNome" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea id="descricao" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Preço</label>
                <input type="number" id="preco" class="form-control">

                <small id="erroPreco" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">URL da Imagem</label>
                <input type="text" id="imagem" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">
                Cadastrar Produto
            </button>

        </form>

        <div class="row mt-5" id="listaProdutos"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
