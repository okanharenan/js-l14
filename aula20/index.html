<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <h1 class="mb-4">Cadastro de Produtos</h1>

        <form id="formProduto" class="bg-white p-4 rounded shadow-sm">

            <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" id="nome" class="form-control">

                <small id="erroNome" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea id="descricao" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Preço</label>
                <input type="number" id="preco" class="form-control">

                <small id="erroPreco" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">URL da Imagem</label>
                <input type="text" id="imagem" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">
                Cadastrar Produto
            </button>

        </form>

        <div class="row mt-5" id="listaProdutos"></div>

    </div>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <div class="container mt-5">

        <section id="atividade2">
            <div class="card shadow p-4">

                <h2 class="text-center mb-3">
                    Comanda Automática
                </h2>

                <p class="text-muted text-center mb-4">
                    Digite os valores e o sistema calculará automaticamente
                    subtotal, taxa de serviço e total final.
                </p>

                <form>

                    <div class="mb-3">
                        <label for="entrada" class="form-label">
                            Entrada
                        </label>

                        <input type="number" class="form-control" id="entrada" placeholder="Digite o valor da entrada">
                    </div>

                    <div class="mb-3">
                        <label for="pratoPrincipal" class="form-label">
                            Prato Principal
                        </label>

                        <input type="number" class="form-control" id="pratoPrincipal"
                            placeholder="Digite o valor do prato principal">
                    </div>

                    <div class="mb-3">
                        <label for="bebidas" class="form-label">
                            Bebidas
                        </label>

                        <input type="number" class="form-control" id="bebidas" placeholder="Digite o valor das bebidas">
                    </div>

                    <div class="mb-3">
                        <label for="sobremesa" class="form-label">
                            Sobremesa
                        </label>

                        <input type="number" class="form-control" id="sobremesa"
                            placeholder="Digite o valor da sobremesa">
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label for="subTotal" class="form-label">
                            Subtotal
                        </label>

                        <input type="number" class="form-control" id="subTotal" value="0" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="taxaServico" class="form-label">
                            Taxa de Serviço (10%)
                        </label>

                        <input type="number" class="form-control" id="taxaServico" value="0" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="total" class="form-label">
                            Total Final
                        </label>

                        <input type="number" class="form-control fw-bold" id="total" value="0" disabled>
                    </div>

                </form>

            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script src="atividade.js"></script>
</body>

</html>
